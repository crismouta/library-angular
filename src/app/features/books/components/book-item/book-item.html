<li>
    <input type="checkbox" [checked]="isSelected()" (change)="onToggleSelection()"
        [attr.aria-label]="'Select ' + book().title" />

    <a [routerLink]="['/books', book().id]">
        {{ book().title }}
    </a>

    - {{ book().author }} - {{ book().category }}

    <button type="button" (click)="onDeleteClick($event)">Delete</button>
</li>
