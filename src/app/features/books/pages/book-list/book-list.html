<h1>Book List</h1>

@if (error()) {
<p>{{ error() }}</p>
}

@if (selectedCount() > 0) {
<button type="button" (click)="onDeleteSelected()">
    Eliminar seleccionados ({{ selectedCount() }})
</button>
}

@if (isLoading()) {
<p>Cargando libros...</p>
} @else {
<ul>
    @for (book of books(); track book.id) {
    <app-book-item [book]="book" [isSelected]="selectedBookIds().has(book.id)" (deleteBook)="onDeleteBook($event)"
        (toggleSelection)="onToggleSelection($event)" />
    } @empty {
    <p>No hay libros disponibles.</p>
    }
</ul>
}

<hr />

<h2>Añadir libro</h2>
<app-book-form submitLabel="Añadir libro" (formSubmit)="onAddBook($event)"></app-book-form>
